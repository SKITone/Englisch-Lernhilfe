<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medienenglisch — Exam Prep</title>
<style>
  :root{--bg:#0f1220;--card:#1a1f35;--ink:#e8ebf5;--muted:#9aa3c0;--accent:#6ea8fe;--good:#37d399;--bad:#ff6b6b;}
  *{box-sizing:border-box}
  html,body{max-width:100%;overflow-x:hidden}
  body{margin:0;background:linear-gradient(160deg,#0f1220,#141937);color:var(--ink);font:17px/1.6 "Segoe UI",system-ui,sans-serif;}
  header{max-width:820px;margin:0 auto;padding:1.2rem 1rem 0;display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;justify-content:space-between}
  header h2{margin:0;font-size:1.15rem;white-space:nowrap}
  .nav{display:flex;gap:.5rem;flex-wrap:wrap}
  main{max-width:820px;margin:0 auto;padding:1rem 1rem 4rem}

  h1{font-size:1.8rem;margin:.2rem 0 .3rem}
  .sub{color:var(--muted);margin:.2rem 0 1.2rem}

  .card{background:var(--card);border:1px solid #2a3157;border-radius:16px;padding:1.3rem 1.5rem;margin:1rem 0;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .card h3{margin-top:0}

  a{color:var(--accent);text-decoration:none}
  .back{display:inline-block;margin-bottom:.8rem;color:var(--muted);font-size:.9rem}
  .back:hover{color:var(--accent)}

  .btn{font:inherit;border-radius:10px;border:1px solid #34407a;background:#10142a;color:var(--ink);padding:.55rem .9rem;cursor:pointer;transition:.12s}
  .btn:hover{border-color:var(--accent)}
  .btn.good{background:rgba(55,211,153,.15);border-color:var(--good);color:#c3f5df}
  .btn.good:hover{background:rgba(55,211,153,.25)}
  .btn.ghost{background:transparent}
  .btn.next{margin-top:1rem}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn:disabled:hover{border-color:#34407a}

  /* Home tiles */
  .tiles{display:flex;flex-direction:column;gap:.7rem;margin-top:1rem}
  .tile{display:flex;align-items:center;gap:1rem;background:var(--card);border:1px solid #2a3157;border-radius:14px;padding:1rem 1.2rem;color:var(--ink);transition:.12s;position:relative}
  .tile:hover{border-color:var(--accent);transform:translateY(-1px)}
  .tnum{flex:0 0 auto;width:2.4rem;height:2.4rem;border-radius:50%;background:#10142a;border:1px solid #34407a;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent)}
  .tbody{flex:1 1 auto;min-width:0}
  .ttopic{font-weight:700}
  .thook{color:var(--muted);font-size:.88rem;margin-top:.15rem}
  .tdone{flex:0 0 auto;font-size:1.3rem}

  /* Tabs (chapter page) */
  .tabbar{display:flex;gap:.4rem;flex-wrap:wrap;margin:1rem 0 .3rem}
  .tab{font:inherit;border-radius:999px;border:1px solid #34407a;background:#10142a;color:var(--muted);padding:.45rem .95rem;cursor:pointer}
  .tab:hover{border-color:var(--accent)}
  .tab.on{background:rgba(110,168,254,.18);border-color:var(--accent);color:var(--ink);font-weight:700}

  /* Practice mode switcher */
  .modes{display:flex;gap:.4rem;flex-wrap:wrap;margin:.4rem 0 1rem}
  .mode{font:inherit;border-radius:999px;border:1px solid #34407a;background:#10142a;color:var(--muted);padding:.45rem .95rem;cursor:pointer}
  .mode:hover{border-color:var(--accent)}
  .mode.on{background:rgba(110,168,254,.18);border-color:var(--accent);color:var(--ink);font-weight:700}

  .meta{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:.82rem;margin-bottom:.5rem}
  .q{font-size:1.15rem;font-weight:600;margin:.3rem 0 .9rem;line-height:1.4}

  .opt{display:block;width:100%;text-align:left;margin:.45rem 0;padding:.75rem .95rem;border-radius:10px;border:1px solid #34407a;background:#10142a;color:var(--ink);cursor:pointer;font:inherit;transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt.correct{background:rgba(55,211,153,.18);border-color:var(--good)}
  .opt.wrong{background:rgba(255,107,107,.15);border-color:var(--bad)}
  .opt:disabled{cursor:default}

  .fb{margin-top:.8rem;font-size:.96rem;min-height:1.2em}
  .fb .why{color:var(--muted);display:block;margin-top:.3rem;font-size:.9rem}

  .answer{background:#10142a;border:1px solid #34407a;border-radius:10px;padding:.9rem 1rem;margin-top:.8rem}
  .usev{margin-top:.7rem;font-size:.88rem;color:var(--muted)}
  .pill{display:inline-block;font-size:.72rem;font-weight:700;padding:.2rem .6rem;border-radius:999px;background:#23284a;color:#9fc1ff;margin:.15rem .25rem 0 0}
  .selfrate{display:flex;gap:.6rem;margin-top:1rem;flex-wrap:wrap}

  .done{text-align:center;padding:1.5rem 1rem;color:var(--good);font-weight:700}

  .vocab-wrap{overflow-x:auto}
  table.vocab{width:100%;border-collapse:collapse}
  table.vocab th{text-align:left;color:var(--muted);font-size:.8rem;text-transform:uppercase;letter-spacing:.03em;padding:.4rem .5rem;border-bottom:1px solid #34407a}
  table.vocab td{padding:.55rem .5rem;border-bottom:1px solid #23284a;vertical-align:top}
  table.vocab td.en{font-weight:700;white-space:nowrap}
  table.vocab td.de{color:var(--ink)}
  table.vocab td.note{color:var(--muted);font-size:.85rem}

  pre.prompt{white-space:pre-wrap;word-break:break-word;overflow-x:auto;background:#10142a;border:1px solid #34407a;border-radius:10px;padding:1rem;font-size:.85rem;line-height:1.5;max-height:420px;overflow-y:auto}
  .en-detail{margin-top:.7rem;border-top:1px solid #2a3157;padding-top:.55rem}
  .en-detail>summary{cursor:pointer;color:var(--accent);font-size:.85rem;font-weight:700;list-style:none}
  .en-detail>summary::-webkit-details-marker{display:none}
  .en-detail>summary::before{content:"▸ ";color:var(--muted)}
  .en-detail[open]>summary::before{content:"▾ "}
  .en-detail p{color:var(--ink);margin:.55rem 0 0}
  .factbox{border-color:#34407a}
  .factbox h3{color:var(--accent)}
  ul.facts{margin:.4rem 0 0;padding-left:1.2rem}
  ul.facts li{margin:.4rem 0;line-height:1.5}
  .rollbtn{width:100%;font-size:1.05rem;padding:.7rem}
  .exsep{color:var(--muted);font-size:.85rem;text-align:center;margin:.9rem 0 .6rem}
  .extiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.5rem}
  .extile{text-align:left;padding:.7rem .9rem;border-radius:10px;border:1px solid #34407a;background:#10142a;color:var(--ink);cursor:pointer;font:inherit;transition:.12s}
  .extile:hover{border-color:var(--accent);background:#161b33}
  .tprog{display:flex;align-items:center;gap:.5rem;margin-top:.5rem}
  .tbar{flex:1;height:7px;border-radius:5px;background:#10142a;border:1px solid #34407a;overflow:hidden}
  .tbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--good));width:0}
  .tpct{font-size:.78rem;color:var(--muted);white-space:nowrap}

  .checks{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
  .chk{display:flex;align-items:center;gap:.5rem;font-size:.92rem;color:var(--ink)}
  .chk input{accent-color:var(--accent)}

  details{margin-top:1rem}
  summary{cursor:pointer;color:var(--accent)}

  @media(max-width:560px){
    header{flex-direction:column;align-items:flex-start}
    .tile{padding:.8rem}
  }
</style>
</head>
<body>
<header>
  <h2>📘 Medienenglisch</h2>
  <div class="nav">
    <a class="btn" href="#home">🏠 Chapters</a>
    <a class="btn" href="#exam">🎓 Exam Simulation</a>
    <button class="btn ghost" id="resetBtn">↺ Reset progress</button>
  </div>
</header>
<main id="app"></main>
<script src="content.js"></script>
<script>
const NS = "medienenglisch_";
const store = {
  get(k, fb){ try { const v = JSON.parse(localStorage.getItem(NS+k)); return v === null || v === undefined ? fb : v; } catch(e){ return fb; } },
  set(k, v){ localStorage.setItem(NS+k, JSON.stringify(v)); },
  progress(){ return store.get("progress", {}); },   // { [chapterId]: [knownCardKey, ...] }
  mark(id, cardKey, known){
    const p = store.progress(); const set = new Set(Array.isArray(p[id]) ? p[id] : []);
    if(known) set.add(cardKey); else set.delete(cardKey);
    p[id] = [...set]; store.set("progress", p);
  },
  resetAll(){ Object.keys(localStorage).filter(k=>k.startsWith(NS)).forEach(k=>localStorage.removeItem(k)); }
};

function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
const app = () => document.getElementById('app');

function route(){
  const [view, param] = (location.hash.replace(/^#/,'') || 'home').split('/');
  if(view==='chapter') return renderChapter(Number(param));
  if(view==='exam')    return renderExam();
  return renderHome();
}
window.addEventListener('hashchange', route);

function renderHome(){
  const p = store.progress();
  const tiles = CHAPTERS.map(c=>{
    const total = c.mc.length + c.recall.length;
    const known = (p[c.id]||[]).length;
    const pct = total ? Math.round(100*known/total) : 0;
    const check = total && known>=total ? ' ✅' : '';
    return `<a class="tile" href="#chapter/${c.id}">
      <div class="tnum">${c.id}</div>
      <div class="tbody"><div class="ttopic">${c.topic}</div>
      <div class="thook">${c.hook}</div>
      <div class="tprog"><div class="tbar"><i style="width:${pct}%"></i></div><span class="tpct">${known}/${total}${check}</span></div>
      </div></a>`;
  }).join('');
  app().innerHTML = `<h1>Medienenglisch</h1>
    <p class="sub">Work through all ${CHAPTERS.length} chapters — summary, vocabulary, practice.</p>
    <div class="tiles">${tiles}</div>`;
}

function renderChapter(id, tab='summary'){
  const c = CHAPTERS.find(x=>x.id===id);
  if(!c){ location.hash='home'; return; }
  const tabs = [['summary','Summary'],['vocab','Vocabulary'],['practice','Practice']]
    .map(([k,l])=>`<button class="tab ${k===tab?'on':''}" data-tab="${k}">${l}</button>`).join('');
  app().innerHTML = `<a class="back" href="#home">← Chapters</a>
    <h1>${c.id}. ${c.topic}</h1><p class="sub">${c.hook}</p>
    <div class="tabbar">${tabs}</div><div id="tabc"></div>`;
  app().querySelectorAll('.tab').forEach(b=> b.onclick=()=>renderChapter(id, b.dataset.tab));
  const host = document.getElementById('tabc');
  if(tab==='summary') renderSummary(host, c);
  else if(tab==='vocab') renderVocab(host, c);
  else renderPractice(host, c);
}

function renderSummary(host, c){
  const sections = c.summary.map(s=>
    `<div class="card"><h3>${s.h}</h3><p>${s.en}</p>
     <details class="en-detail"><summary>Auf Deutsch</summary><p>${s.de}</p></details></div>`).join('');
  const facts = (c.details||[]).map(d=>`<li>${d}</li>`).join('');
  const factbox = facts ? `<div class="card factbox"><h3>📌 Details &amp; Facts</h3><ul class="facts">${facts}</ul></div>` : '';
  host.innerHTML = sections + factbox;
}

function renderVocab(host, c){
  const rows = c.vocab.map(v=>
    `<tr><td class="en">${v.en}</td><td class="de">${v.de}</td>
     <td class="note">${v.note||''}</td></tr>`).join('');
  host.innerHTML = `<div class="card"><div class="vocab-wrap"><table class="vocab">
    <thead><tr><th>English</th><th>German</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

function renderPractice(host, c, opts={}){
  const modes = [['mc','Multiple-Choice'],['recall','Free-Recall'],['coach','🤖 AI Coach']];
  host.innerHTML = `<div class="modes">${modes.map(([k,l])=>
    `<button class="mode" data-m="${k}">${l}</button>`).join('')}</div><div id="modec"></div>`;
  const mc = document.getElementById('modec');
  host.querySelectorAll('.mode').forEach(b=> b.onclick=()=>{
    host.querySelectorAll('.mode').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    if(b.dataset.m==='mc') runMC(mc, c);
    else if(b.dataset.m==='recall') runRecall(mc, c);
    else runCoach(mc, c);
  });
  const first = opts.blind ? host.querySelector('[data-m="recall"]') : host.querySelector('.mode');
  first.click();
}

function shuffle(a){ const r=a.slice(); for(let i=r.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[r[i],r[j]]=[r[j],r[i]];} return r; }
function runMC(host, c){
  let i=0; const items=c.mc;
  function draw(){
    if(i>=items.length){ host.innerHTML=`<div class="done">✅ Done! ${items.length} questions.</div>`; return; }
    const m=items[i]; const order=shuffle(m.options.map((_,k)=>k)); const rightPos=order.indexOf(m.correct);
    host.innerHTML=`<div class="card"><div class="meta">Question ${i+1}/${items.length}</div>
      <div class="q">${m.q}</div><div id="opts"></div><div class="fb" id="fb"></div>
      <button class="btn next" id="nx" style="display:none">Next →</button></div>`;
    const opts=host.querySelector('#opts');
    order.forEach((orig,pos)=>{ const b=el(`<button class="opt">${m.options[orig]}</button>`);
      b.onclick=()=>answer(pos,rightPos,m); opts.appendChild(b); });
  }
  function answer(pos,right,m){
    const os=[...host.querySelectorAll('.opt')]; os.forEach(o=>o.disabled=true);
    os[right].classList.add('correct'); const ok=pos===right; if(!ok) os[pos].classList.add('wrong');
    store.mark(c.id, 'mc:'+i, ok);
    host.querySelector('#fb').innerHTML=(ok?'✅ Correct. ':'❌ Nope. ')+`<span class="why">${m.why}</span>`;
    const nx=host.querySelector('#nx'); nx.style.display='inline-block'; nx.onclick=()=>{i++;draw();};
  }
  draw();
}

function runRecall(host, c){
  let i=0; const items=c.recall;
  function draw(){
    if(i>=items.length){ host.innerHTML=`<div class="done">✅ Done! ${items.length} questions.</div>`; return; }
    const r=items[i];
    host.innerHTML=`<div class="card"><div class="meta">Card ${i+1}/${items.length}</div>
      <div class="q">${r.q}</div>
      <button class="btn" id="rev">Show answer</button>
      <div id="ans" style="display:none">
        <div class="answer">${r.answer}</div>
        ${r.useVocab?.length?`<div class="usev">Vocabulary: ${r.useVocab.map(v=>`<span class="pill">${v}</span>`).join(' ')}</div>`:''}
        <div class="selfrate"><button class="btn good" data-k="1">Got it ✓</button>
          <button class="btn ghost" data-k="0">Again ↻</button></div></div></div>`;
    document.getElementById('rev').onclick=()=>{ document.getElementById('ans').style.display='block'; };
    host.querySelectorAll('.selfrate .btn').forEach(b=> b.onclick=()=>{ store.mark(c.id, 'recall:'+i, b.dataset.k==='1'); i++; draw(); });
  }
  draw();
}

function buildCoachPrompt(c){
  const sum = c.summary.map(s=>`• ${s.h}: ${s.body}`).join('\n');
  const pool = [...c.mc.map(m=>m.q), ...c.recall.map(r=>r.q)].map(q=>`- ${q}`).join('\n');
  return `You are an oral examiner for a university "Media English" course. Be friendly but demanding.
Topic of this exam: "${c.topic}" (${c.hook}).

Use ONLY the material below as ground truth about the chapter:
${sum}

Question pool (draw from these and ask natural follow-ups):
${pool}

Rules:
1. Ask ONE question at a time, in English. Wait for my typed answer before continuing.
2. After each answer give brief feedback on (a) content correctness and (b) my English, then ask a follow-up or the next question.
3. Ask 6–8 questions total, increasing difficulty.
4. At the end, give a short summary of my strengths and the gaps I should review.

Start now with your first question.`;
}

function copyText(str, btn){
  const done=()=>{ const t=btn.textContent; btn.textContent='copied ✓'; setTimeout(()=>btn.textContent=t,1500); };
  if(navigator.clipboard && location.protocol!=='file:'){ navigator.clipboard.writeText(str).then(done).catch(()=>fallback()); }
  else fallback();
  function fallback(){ const ta=el(`<textarea style="position:fixed;left:-9999px"></textarea>`);
    ta.value=str; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); done(); }catch(e){ alert('Copy failed — please select the text manually.'); }
    document.body.removeChild(ta); }
}

function runCoach(host, c){
  host.innerHTML=`<div class="card">
    <p>Click "Copy prompt" and paste it into any LLM (ChatGPT, Claude …).
    The LLM will then examine you in English on this chapter — you type your answers.</p>
    <button class="btn good" id="cp">📋 Copy prompt</button>
    <details style="margin-top:1rem"><summary>View prompt</summary>
      <pre class="prompt" id="pv"></pre></details></div>`;
  const prompt=buildCoachPrompt(c);
  document.getElementById('pv').textContent=prompt;
  document.getElementById('cp').onclick=(e)=>copyText(prompt, e.target);
}

function renderExam(){
  const tiles = CHAPTERS.map(c=>
    `<button class="extile" data-id="${c.id}">${c.id}. ${c.topic}</button>`).join('');
  app().innerHTML=`<a class="back" href="#home">← Chapters</a>
    <h1>🎓 Exam Simulation</h1>
    <p class="sub">Just like the examiner: get tested on a chapter without seeing the summary first. Roll at random or pick yourself.</p>
    <div class="card">
      <button class="btn good rollbtn" id="roll">🎲 Test a random chapter</button>
      <div class="exsep">or pick a chapter yourself</div>
      <div class="extiles">${tiles}</div>
      <div class="fb" id="rollfb"></div>
    </div>
    <div id="examstage"></div>`;
  function start(c){
    document.getElementById('rollfb').innerHTML=`Drawn: <b>Chapter ${c.id} — ${c.topic}</b>. Answer blind; you'll only see the summary afterwards on the chapter page.`;
    renderPractice(document.getElementById('examstage'), c, {blind:true});
    document.getElementById('examstage').scrollIntoView({behavior:'smooth', block:'start'});
  }
  document.getElementById('roll').onclick=()=> start(CHAPTERS[Math.random()*CHAPTERS.length|0]);
  app().querySelectorAll('.extile').forEach(b=> b.onclick=()=> start(CHAPTERS.find(x=>x.id===+b.dataset.id)));
}

document.getElementById('resetBtn').onclick=()=>{
  if(confirm('Really reset your progress?')){ store.resetAll(); route(); }
};

route();
</script>
</body>
</html>
